<!DOCTYPE html>
<html>
<head>
    <title>Order Tracking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Order Tracking System</h1>

<div class="form">
    <input type="number" id="orderId" placeholder="Order ID">
    <input type="text" id="customerName" placeholder="Customer Name">
    <input type="text" id="productName" placeholder="Product Name">
    <button onclick="addOrder()">Add Order</button>
</div>

<hr>

<div class="form">
    <input type="number" id="updateId" placeholder="Order ID">
    <input type="text" id="newStatus" placeholder="New Status (Pending/Shipped/Delivered)">
    <button onclick="updateStatus()">Update Status</button>
</div>

<h2>All Orders</h2>
<div id="ordersList"></div>

<script src="script.js"></script>
</body>
</html>
